<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Document Scanner Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Strict A4 Aspect Ratio: 1 / 1.4142 */
        .doc-aspect { aspect-ratio: 1 / 1.4142; }
        .hidden-input { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-6">

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        <section class="lg:col-span-5 space-y-4">
            <div id="viewport" class="relative bg-slate-900 rounded-xl overflow-hidden doc-aspect w-full shadow-lg">
                <video id="video" autoplay playsinline class="absolute inset-0 w-full h-full object-cover"></video>
            </div>
            <button id="btn-capture" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-lg transition-all">
                Capture A4 Page
            </button>
        </section>

        <section class="lg:col-span-7">
            <div id="gallery-grid" class="grid grid-cols-2 gap-4"></div>
            <button id="btn-save-pdf" class="mt-6 w-full bg-slate-900 text-white font-bold py-4 rounded-xl hidden">
                Generate PDF
            </button>
        </section>
    </main>

    <script>
        const video = document.getElementById('video');
        const btnCapture = document.getElementById('btn-capture');
        const galleryGrid = document.getElementById('gallery-grid');
        const btnSavePdf = document.getElementById('btn-save-pdf');
        let pagesArray = [];

        // Initialize Camera
        async function initCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
        }
        initCamera();

        // Capture Logic with A4 Ratio Enforcement
        btnCapture.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            const ratio = 1 / 1.4142; // A4 Ratio
            
            // Logic: Capture the largest possible area matching the A4 ratio from the video
            const videoWidth = video.videoWidth;
            const videoHeight = video.videoHeight;
            
            let drawWidth = videoWidth;
            let drawHeight = videoWidth / ratio;
            
            if (drawHeight > videoHeight) {
                drawHeight = videoHeight;
                drawWidth = videoHeight * ratio;
            }

            canvas.width = drawWidth;
            canvas.height = drawHeight;
            
            const ctx = canvas.getContext('2d');
            const sx = (videoWidth - drawWidth) / 2;
            const sy = (videoHeight - drawHeight) / 2;
            
            ctx.drawImage(video, sx, sy, drawWidth, drawHeight, 0, 0, drawWidth, drawHeight);
            
            pagesArray.push(canvas.toDataURL('image/jpeg', 0.9));
            renderGallery();
        });

        function renderGallery() {
            galleryGrid.innerHTML = '';
            pagesArray.forEach((src, index) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = "rounded-lg border shadow-sm doc-aspect w-full object-cover";
                galleryGrid.appendChild(img);
            });
            if(pagesArray.length > 0) btnSavePdf.classList.remove('hidden');
        }

        btnSavePdf.addEventListener('click', () => {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'pt', 'a4');
            pagesArray.forEach((src, i) => {
                if(i > 0) pdf.addPage();
                pdf.addImage(src, 'JPEG', 0, 0, 595.28, 841.89);
            });
            pdf.save("scanned_document.pdf");
        });
    </script>
</body>
</html>

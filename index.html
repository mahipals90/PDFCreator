<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HD Scanner · Smart Document Crop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .hidden-input { display: none; }
        .doc-aspect { aspect-ratio: 1 / 1.4142; }
        .draggable-card { transition: transform 0.2s ease, opacity 0.2s ease; cursor: grab; }
        .draggable-card:active { cursor: grabbing; }
        .drag-over { border: 2px dashed #4f46e5 !important; background-color: #f5f3ff !important; opacity: 0.6; }
        .tick-overlay {
            transition: opacity 0.2s ease-in-out, transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .capture-area {
            background: #0b1120;
        }
        /* No decorative borders inside capture frame */
        .capture-frame {
            border: none;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-indigo-600 text-white p-2 rounded-lg">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">Smart Document Scanner</h1>
            </div>
            <span class="text-xs font-semibold bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full uppercase tracking-wider">auto‑crop v2</span>
        </div>
    </header>

    <main class="max-w-6xl w-full mx-auto p-4 md:p-6 flex-grow grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- LEFT: Camera + Controls -->
        <section class="lg:col-span-5 bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col space-y-4 h-fit sticky lg:top-24">
            <div class="flex items-center space-x-2 pb-2 border-b border-slate-100">
                <span class="flex items-center justify-center bg-indigo-600 text-white rounded-full h-6 w-6 text-xs font-bold">1</span>
                <h2 class="text-lg font-semibold text-slate-900">Scan Viewport</h2>
                <span class="ml-auto text-[10px] text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded-full font-medium">document‑only</span>
            </div>
            
            <div class="relative bg-slate-900 rounded-xl overflow-hidden doc-aspect w-full flex items-center justify-center border border-slate-700 shadow-inner group capture-area">
                <video id="video" autoplay playsinline class="absolute inset-0 w-full h-full object-cover"></video>
                
                <div id="capture-tick" class="tick-overlay absolute inset-0 flex items-center justify-center bg-emerald-950/40 opacity-0 pointer-events-none scale-75 z-20 backdrop-blur-[1px]">
                    <div class="bg-white text-emerald-600 p-5 rounded-full shadow-2xl border-4 border-emerald-500 transform transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                        </svg>
                    </div>
                </div>

                <div id="camera-fallback" class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center text-slate-400 bg-slate-900 hidden z-10">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mb-3 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                    <p class="text-sm font-medium text-white">Camera unavailable</p>
                    <p class="text-xs text-slate-400 mt-2 max-w-xs">Please use file import or allow camera access.</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <button id="btn-capture" class="flex items-center justify-center space-x-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-xl shadow-sm transition-all focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        <circle cx="12" cy="13" r="3" />
                    </svg>
                    <span>Scan Document</span>
                </button>
                
                <button id="btn-upload-trigger" class="flex items-center justify-center space-x-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-3 px-4 rounded-xl transition-all border border-slate-200">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    <span>Import File</span>
                </button>
            </div>
            
            <input type="file" id="global-upload" class="hidden-input" accept="image/*">
            <input type="file" id="retake-upload" class="hidden-input" accept="image/*">
        </section>

        <!-- RIGHT: Gallery + Export -->
        <section class="lg:col-span-7 flex flex-col space-y-6">
            
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex-grow">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between pb-4 border-b border-slate-100 mb-4 gap-2">
                    <div class="flex items-center space-x-2">
                        <span class="flex items-center justify-center bg-indigo-600 text-white rounded-full h-6 w-6 text-xs font-bold">2</span>
                        <h2 class="text-lg font-semibold text-slate-900">Pages</h2>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="text-[11px] text-amber-600 font-medium bg-amber-50 border border-amber-100 px-2 py-0.5 rounded-md">↕ drag to reorder</span>
                        <span id="page-count" class="text-xs font-medium text-slate-500 bg-slate-100 px-2.5 py-1 rounded-md">0 Pages</span>
                    </div>
                </div>

                <div id="gallery-empty" class="py-24 text-center text-slate-400 flex flex-col items-center justify-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-300 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01" />
                    </svg>
                    <p class="text-sm font-medium">No pages yet</p>
                    <p class="text-xs text-slate-400 max-w-xs mt-1">Scan or upload a document — only the document area will be captured.</p>
                </div>

                <div id="gallery-grid" class="grid grid-cols-2 sm:grid-cols-3 gap-4"></div>
            </div>

            <!-- Export -->
            <div class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm flex flex-col space-y-4">
                <div class="flex items-center space-x-2 pb-2 border-b border-slate-100">
                    <span class="flex items-center justify-center bg-indigo-600 text-white rounded-full h-6 w-6 text-xs font-bold">3</span>
                    <h2 class="text-lg font-semibold text-slate-900">Export PDF</h2>
                    <span class="ml-auto text-[10px] text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full font-medium">full‑bleed</span>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                    <div class="md:col-span-7">
                        <label for="filename-input" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">File name</label>
                        <div class="relative">
                            <input type="text" id="filename-input" placeholder="scan_document" class="w-full bg-slate-50 border border-slate-200 text-slate-900 px-4 py-2.5 rounded-xl text-sm font-medium focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all">
                            <span class="absolute right-4 top-1/2 transform -translate-y-1/2 text-xs font-medium text-slate-400">.pdf</span>
                        </div>
                    </div>

                    <div class="md:col-span-5">
                        <button id="btn-save-pdf" class="w-full flex items-center justify-center space-x-2 bg-slate-900 hover:bg-slate-800 text-white font-medium py-2.5 px-4 rounded-xl shadow-sm transition-all focus:ring-2 focus:ring-slate-900 focus:ring-offset-2 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                            <svg id="loading-spinner" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span id="btn-save-text">Generate PDF</span>
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- hidden sandbox for PDF rendering -->
    <div id="render-sandbox" class="absolute top-0 left-0 pointer-events-none opacity-0" style="width: 595px;"></div>

    <script>
        (function() {
            // DOM refs
            const video = document.getElementById('video');
            const cameraFallback = document.getElementById('camera-fallback');
            const btnCapture = document.getElementById('btn-capture');
            const btnUploadTrigger = document.getElementById('btn-upload-trigger');
            const globalUpload = document.getElementById('global-upload');
            const retakeUpload = document.getElementById('retake-upload');
            const galleryGrid = document.getElementById('gallery-grid');
            const galleryEmpty = document.getElementById('gallery-empty');
            const pageCountBadge = document.getElementById('page-count');
            const filenameInput = document.getElementById('filename-input');
            const btnSavePdf = document.getElementById('btn-save-pdf');
            const btnSaveText = document.getElementById('btn-save-text');
            const loadingSpinner = document.getElementById('loading-spinner');
            const renderSandbox = document.getElementById('render-sandbox');
            const captureTick = document.getElementById('capture-tick');

            // state
            let pagesArray = [];
            let targetRetakeIndex = null;
            let dragSourceIndex = null;

            const todayStr = new Date().toISOString().slice(0,10).replace(/-/g,"");
            filenameInput.placeholder = `scan_${todayStr}`;

            // ---------- CAMERA ----------
            async function initCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } },
                        audio: false
                    });
                    video.srcObject = stream;
                } catch (err) {
                    console.warn("Camera blocked:", err);
                    video.classList.add('hidden');
                    cameraFallback.classList.remove('hidden');
                    btnCapture.disabled = true;
                    btnCapture.classList.add('opacity-40', 'cursor-not-allowed');
                }
            }
            initCamera();

            function flashSuccessTick() {
                captureTick.classList.remove('opacity-0', 'scale-75', 'pointer-events-none');
                captureTick.classList.add('opacity-100', 'scale-100');
                setTimeout(() => {
                    captureTick.classList.remove('opacity-100', 'scale-100');
                    captureTick.classList.add('opacity-0', 'scale-75', 'pointer-events-none');
                }, 400);
            }

            // ---------- CORE: capture ONLY the document area ----------
            function captureDocumentOnly() {
                if (video.paused || video.ended || !video.videoWidth) return null;

                const vw = video.videoWidth;
                const vh = video.videoHeight;

                // 1. Grab frame data
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = vw;
                tempCanvas.height = vh;
                const ctx = tempCanvas.getContext('2d');
                ctx.drawImage(video, 0, 0, vw, vh);
                const imageData = ctx.getImageData(0, 0, vw, vh);
                const data = imageData.data;

                // 2. Find bounding box of non‑background content (document)
                let minX = vw, minY = vh, maxX = 0, maxY = 0;
                const threshold = 30;    // luminance threshold for document vs background
                const edgeMargin = 6;    // ignore extreme edges to avoid noise

                for (let y = edgeMargin; y < vh - edgeMargin; y++) {
                    for (let x = edgeMargin; x < vw - edgeMargin; x++) {
                        const idx = (y * vw + x) * 4;
                        const lum = 0.299 * data[idx] + 0.587 * data[idx+1] + 0.114 * data[idx+2];
                        if (lum > threshold) {
                            if (x < minX) minX = x;
                            if (y < minY) minY = y;
                            if (x > maxX) maxX = x;
                            if (y > maxY) maxY = y;
                        }
                    }
                }

                // If no document found (all dark/empty), fallback to center crop with A4 ratio
                if (maxX <= minX || maxY <= minY) {
                    let cropW = vw;
                    let cropH = vw * 1.4142;
                    if (cropH > vh) {
                        cropH = vh;
                        cropW = vh / 1.4142;
                    }
                    const sx = (vw - cropW) / 2;
                    const sy = (vh - cropH) / 2;
                    return { sx, sy, cropW, cropH };
                }

                // Add small padding to avoid cutting text near edge
                const pad = 4;
                minX = Math.max(0, minX - pad);
                minY = Math.max(0, minY - pad);
                maxX = Math.min(vw, maxX + pad);
                maxY = Math.min(vh, maxY + pad);

                let cropW = maxX - minX;
                let cropH = maxY - minY;

                // 3. Adjust to A4 aspect ratio (1:1.4142) while keeping document centered
                const targetRatio = 1 / 1.4142; // width/height
                let finalW = cropW;
                let finalH = cropH;

                if (cropW / cropH > targetRatio) {
                    // too wide: adjust height
                    finalH = cropW / targetRatio;
                    finalW = cropW;
                } else {
                    // too tall: adjust width
                    finalW = cropH * targetRatio;
                    finalH = cropH;
                }

                // Center the adjusted crop within the detected bounds
                let sx = minX - (finalW - cropW) / 2;
                let sy = minY - (finalH - cropH) / 2;
                sx = Math.max(0, Math.min(vw - finalW, sx));
                sy = Math.max(0, Math.min(vh - finalH, sy));
                if (sx + finalW > vw) { finalW = vw - sx; }
                if (sy + finalH > vh) { finalH = vh - sy; }
                if (finalW < 10 || finalH < 10) {
                    // fallback
                    let cropW2 = vw;
                    let cropH2 = vw * 1.4142;
                    if (cropH2 > vh) {
                        cropH2 = vh;
                        cropW2 = vh / 1.4142;
                    }
                    const sx2 = (vw - cropW2) / 2;
                    const sy2 = (vh - cropH2) / 2;
                    return { sx: sx2, sy: sy2, cropW: cropW2, cropH: cropH2 };
                }

                return { sx, sy, cropW: finalW, cropH: finalH };
            }

            function captureAndPush() {
                if (video.paused || video.ended || !video.videoWidth) return;
                flashSuccessTick();

                const rect = captureDocumentOnly();
                if (!rect) return;
                const { sx, sy, cropW, cropH } = rect;

                const canvas = document.createElement('canvas');
                canvas.width = cropW;
                canvas.height = cropH;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, canvas.width, canvas.height);
                const imgData = canvas.toDataURL('image/jpeg', 0.85);
                handleImageIngress(imgData);
            }

            btnCapture.addEventListener('click', captureAndPush);

            // ---------- FILE UPLOAD ----------
            btnUploadTrigger.addEventListener('click', () => {
                targetRetakeIndex = null;
                globalUpload.click();
            });

            globalUpload.addEventListener('change', (e) => {
                processFile(e.target.files[0], (dataUrl) => {
                    handleImageIngress(dataUrl);
                    globalUpload.value = '';
                });
            });

            retakeUpload.addEventListener('change', (e) => {
                if (targetRetakeIndex === null) return;
                processFile(e.target.files[0], (dataUrl) => {
                    pagesArray[targetRetakeIndex].src = dataUrl;
                    targetRetakeIndex = null;
                    renderGallery();
                    retakeUpload.value = '';
                });
            });

            function processFile(file, callback) {
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => callback(event.target.result);
                reader.readAsDataURL(file);
            }

            function handleImageIngress(imgData) {
                if (targetRetakeIndex !== null) {
                    pagesArray[targetRetakeIndex].src = imgData;
                    targetRetakeIndex = null;
                } else {
                    pagesArray.push({ id: crypto.randomUUID(), src: imgData });
                }
                renderGallery();
            }

            // ---------- GALLERY ----------
            window.deletePage = function(index) {
                pagesArray.splice(index, 1);
                renderGallery();
            };

            window.triggerRetake = function(index) {
                targetRetakeIndex = index;
                if (video.classList.contains('hidden')) {
                    retakeUpload.click();
                } else {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    video.parentElement.classList.add('ring-4', 'ring-amber-500');
                    setTimeout(() => video.parentElement.classList.remove('ring-4', 'ring-amber-500'), 1200);
                }
            };

            window.handleDragStart = function(e, index) {
                dragSourceIndex = index;
                e.dataTransfer.effectAllowed = 'move';
                e.currentTarget.classList.add('opacity-40');
            };
            window.handleDragOver = function(e) {
                if (e.preventDefault) e.preventDefault();
                return false;
            };
            window.handleDragEnter = function(e) {
                e.currentTarget.classList.add('drag-over');
            };
            window.handleDragLeave = function(e) {
                e.currentTarget.classList.remove('drag-over');
            };
            window.handleDrop = function(e, targetIndex) {
                e.stopPropagation();
                if (dragSourceIndex !== targetIndex) {
                    const movingNode = pagesArray[dragSourceIndex];
                    pagesArray.splice(dragSourceIndex, 1);
                    pagesArray.splice(targetIndex, 0, movingNode);
                    renderGallery();
                }
                return false;
            };
            window.handleDragEnd = function(e) {
                e.currentTarget.classList.remove('opacity-40');
                document.querySelectorAll('.draggable-card').forEach(item => item.classList.remove('drag-over'));
            };

            function renderGallery() {
                galleryGrid.innerHTML = '';
                if (pagesArray.length === 0) {
                    galleryEmpty.classList.remove('hidden');
                    pageCountBadge.textContent = "0 Pages";
                    btnSavePdf.disabled = true;
                    return;
                }
                galleryEmpty.classList.add('hidden');
                btnSavePdf.disabled = false;
                pageCountBadge.textContent = `${pagesArray.length} ${pagesArray.length === 1 ? 'Page' : 'Pages'}`;

                pagesArray.forEach((page, index) => {
                    const card = document.createElement('div');
                    card.className = "bg-slate-50 border border-slate-200 rounded-xl overflow-hidden shadow-sm flex flex-col draggable-card group relative";
                    card.setAttribute('draggable', 'true');
                    card.setAttribute('ondragstart', `handleDragStart(event, ${index})`);
                    card.setAttribute('ondragover', `handleDragOver(event)`);
                    card.setAttribute('ondragenter', `handleDragEnter(event)`);
                    card.setAttribute('ondragleave', `handleDragLeave(event)`);
                    card.setAttribute('ondrop', `handleDrop(event, ${index})`);
                    card.setAttribute('ondragend', `handleDragEnd(event)`);
                    card.innerHTML = `
                        <div class="absolute top-2 left-2 bg-slate-900/70 text-white backdrop-blur-sm text-[10px] font-bold px-2 py-0.5 rounded z-10 flex items-center space-x-1">
                            <span class="cursor-grab active:cursor-grabbing text-slate-400 font-normal">☰</span>
                            <span>P. ${index + 1}</span>
                        </div>
                        <div class="w-full doc-aspect bg-slate-100 overflow-hidden flex items-center justify-center border-b border-slate-200 relative">
                            <img src="${page.src}" class="w-full h-full object-cover select-none pointer-events-none" alt="page ${index+1}">
                        </div>
                        <div class="p-2 grid grid-cols-2 gap-1.5 bg-white z-10">
                            <button onclick="triggerRetake(${index})" class="text-[11px] font-medium text-indigo-600 bg-indigo-50 hover:bg-indigo-100 py-1.5 px-1 rounded-md transition-colors flex items-center justify-center space-x-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.253 8H18" />
                                </svg>
                                <span>Retake</span>
                            </button>
                            <button onclick="deletePage(${index})" class="text-[11px] font-medium text-rose-600 bg-rose-50 hover:bg-rose-100 py-1.5 px-1 rounded-md transition-colors flex items-center justify-center space-x-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                </svg>
                                <span>Delete</span>
                            </button>
                        </div>
                    `;
                    galleryGrid.appendChild(card);
                });
            }

            // ---------- PDF EXPORT: FULL BLEED ----------
            async function compileToPDF() {
                if (pagesArray.length === 0) return;
                btnSavePdf.disabled = true;
                loadingSpinner.classList.remove('hidden');
                btnSaveText.textContent = "Rendering...";

                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'pt', 'a4');
                const pdfWidth = 595.28;
                const pdfHeight = 841.89;

                try {
                    for (let i = 0; i < pagesArray.length; i++) {
                        if (i > 0) pdf.addPage();

                        const wrapper = document.createElement('div');
                        wrapper.style.width = pdfWidth + 'px';
                        wrapper.style.height = pdfHeight + 'px';
                        wrapper.style.display = 'flex';
                        wrapper.style.alignItems = 'center';
                        wrapper.style.justifyContent = 'center';
                        wrapper.style.backgroundColor = '#ffffff';
                        wrapper.style.overflow = 'hidden';
                        wrapper.style.margin = '0';
                        wrapper.style.padding = '0';

                        const img = document.createElement('img');
                        img.src = pagesArray[i].src;
                        img.style.width = '100%';
                        img.style.height = '100%';
                        img.style.objectFit = 'cover';
                        img.style.display = 'block';
                        wrapper.appendChild(img);
                        renderSandbox.appendChild(wrapper);

                        const canvas = await html2canvas(wrapper, {
                            scale: 2.5,
                            useCORS: true,
                            logging: false,
                            backgroundColor: '#ffffff',
                            width: pdfWidth,
                            height: pdfHeight
                        });

                        renderSandbox.removeChild(wrapper);
                        const data = canvas.toDataURL('image/jpeg', 0.82);
                        pdf.addImage(data, 'JPEG', 0, 0, pdfWidth, pdfHeight, undefined, 'FAST');
                    }

                    let fname = filenameInput.value.trim() || filenameInput.placeholder;
                    if (!fname.toLowerCase().endsWith('.pdf')) fname += '.pdf';
                    pdf.save(fname);
                } catch (err) {
                    console.error("PDF error:", err);
                    alert("Error generating PDF.");
                } finally {
                    btnSavePdf.disabled = false;
                    loadingSpinner.classList.add('hidden');
                    btnSaveText.textContent = "Generate PDF";
                }
            }

            btnSavePdf.addEventListener('click', compileToPDF);
        })();
    </script>
</body>
</html>

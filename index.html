<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Document Scanner PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Force vertical A4 Portrait orientation */
        .doc-aspect { aspect-ratio: 1 / 1.4142; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen p-6">

    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-8">
        <section class="space-y-4">
            <div id="viewport" class="relative bg-slate-900 rounded-xl overflow-hidden doc-aspect w-full shadow-lg">
                <video id="video" autoplay playsinline class="absolute inset-0 w-full h-full object-cover"></video>
            </div>
            <button id="btn-capture" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl shadow-md transition-all">
                Capture Vertical Page
            </button>
        </section>

        <section class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Filename</label>
                <input type="text" id="filename-input" placeholder="my_document" class="w-full px-4 py-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div id="gallery-grid" class="grid grid-cols-2 gap-3"></div>

            <button id="btn-save-pdf" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hidden transition-all hover:bg-slate-800">
                Generate PDF
            </button>
        </section>
    </main>

    <script>
        const video = document.getElementById('video');
        const btnCapture = document.getElementById('btn-capture');
        const galleryGrid = document.getElementById('gallery-grid');
        const btnSavePdf = document.getElementById('btn-save-pdf');
        const filenameInput = document.getElementById('filename-input');
        let pagesArray = [];

        async function initCamera() {
            try {
                // Requesting vertical orientation via constraints
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
            } catch (err) { console.error("Camera error:", err); }
        }
        initCamera();

        btnCapture.addEventListener('click', () => {
            const canvas = document.createElement('canvas');
            const ratio = 1 / 1.4142; 
            
            // Set canvas to Portrait A4
            const width = video.videoWidth;
            const height = width / ratio;
            
            canvas.width = width;
            canvas.height = height;
            
            const ctx = canvas.getContext('2d');
            // Draw centered crop to match vertical A4
            ctx.drawImage(video, 0, (video.videoHeight - height) / 2, width, height, 0, 0, width, height);
            
            pagesArray.push(canvas.toDataURL('image/jpeg', 0.9));
            renderGallery();
        });

        function renderGallery() {
            galleryGrid.innerHTML = '';
            pagesArray.forEach((src) => {
                const img = document.createElement('img');
                img.src = src;
                img.className = "rounded-lg border shadow-sm doc-aspect w-full object-cover";
                galleryGrid.appendChild(img);
            });
            if(pagesArray.length > 0) btnSavePdf.classList.remove('hidden');
        }

        btnSavePdf.addEventListener('click', () => {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'pt', 'a4');
            const fileName = filenameInput.value.trim() || 'scanned_document';
            
            pagesArray.forEach((src, i) => {
                if(i > 0) pdf.addPage();
                pdf.addImage(src, 'JPEG', 0, 0, 595.28, 841.89);
            });
            pdf.save(`${fileName}.pdf`);
        });
    </script>
</body>
</html>
